<!-- Mobile Menu Overlay (hidden by default) -->
<div id="mobile-overlay" class="fixed inset-0 bg-black/70 z-40 hidden md:hidden" onclick="closeMobileMenu()"></div>

<!-- Mobile Menu Button -->
<button id="mobile-menu-btn" class="fixed top-4 left-4 z-50 p-2 bg-[#111827] border border-gray-700 rounded-lg text-white md:hidden" onclick="toggleMobileMenu()">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
</button>

<!-- Sidebar (Desktop: always visible, Mobile: slide-out) -->
<aside id="sidebar" class="fixed md:relative w-64 bg-[#111827] border-r border-gray-800 flex flex-col justify-between h-full z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
    <div class="p-6">
        <div class="flex items-center space-x-2 text-xl font-bold text-white tracking-wide">
            <img src="assets/images/logo.png" alt="Logo" class="h-8 w-auto">
            <span>Circuit2Code</span>
        </div>
        
        <nav class="mt-8 space-y-2">
            <a href="index.html" class="flex items-center space-x-3 px-4 py-2.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                <span>🏠</span> <span>Dashboard</span>
            </a>
            <div class="pt-4 text-xs font-semibold text-gray-500 uppercase tracking-wider px-4">Resources</div>
            <a href="python/index.html" class="flex items-center space-x-3 px-4 py-2.5 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                <span>🐍</span> <span>Python Interview</span>
            </a>
        </nav>
    </div>
    
    <div class="p-4 border-t border-gray-800">
        <div class="text-center mt-4 text-[10px] text-gray-600 uppercase tracking-widest font-mono">
            System v1.0.0
        </div>
    </div>
</aside>

<script>
function toggleMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobile-overlay');
    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
}

function closeMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobile-overlay');
    sidebar.classList.add('-translate-x-full');
    overlay.classList.add('hidden');
}
</script>
